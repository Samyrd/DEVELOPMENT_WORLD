<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign up</title>

  <style>
    .card{
      background-color: white;
      padding:30px; 
      width: 400px;
      border-radius: 16px;
      height:400px;

    }
    body{
      font-family: Arial, Helvetica, sans-serif;
      background-color: white;
      background-image: url("https://images.pexels.com/photos/36598934/pexels-photo-36598934.jpeg");
      background-size: cover;     
      background-position: center;
      padding: 0;
      margin:0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    input{
      margin-bottom: 15px;
      border-radius: 5px;
      padding: 15px;
      border:1px solid black;
      background-color: rgb(212, 237, 193);
    }
    input[type="password"] {
  width: 60%;
  margin: 0 auto 15px auto;
  text-align: center;
}
    h1,h3{
      margin-bottom: 30px;
      text-align: center;
      color:rgb(109, 92, 194);
    }
    button{
      border-radius: 10px;
      background-color: #39e953;
      padding: 10px;
      color:white;
      margin: 100px;
      margin-top: 10px;
      width: 40%;
      border-color:white;
    
      
    }
    button:hover{
      background-color: hotpink;
      font-style: oblique;

    }

    form{
      display: flex;
      flex-direction: column;
    }
    .name-row {
  display: flex;
  gap: 10px;
}

.name-row input {
  flex: 1;
}
  </style>

</head>
<body>
  <div class="card">
    <h1>Sign up </h1>
    <h3>To continue</h3>
  <form>
    <input type="email" name="" id="" placeholder="Email">
    
    <div class="name-row">
    <input type="text" placeholder="First Name">
    <input type="text" placeholder="Last Name">
  </div>
   
  <input type="password" name="" id="" placeholder="Password">
    
    <button type="submit">Sign up</button>
  </form>
  </div>
</body>
</html>
